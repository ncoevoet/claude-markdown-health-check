name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck and jq are pre-installed on ubuntu-latest runners.
      - name: ShellCheck
        run: shellcheck -S warning commands/scripts/*.sh tests/*.sh

      - name: Bash syntax check
        run: |
          for f in commands/scripts/*.sh tests/*.sh; do bash -n "$f"; done

      # Eval JSON parse + full schema/contract validation, the anonymization
      # gate, and the deterministic scanner suite all run inside tests/run.sh
      # (the standalone `jq empty` loop is subsumed by validate-evals.sh).
      - name: Deterministic test suite (anonymization + eval-schema + scanners)
        run: bash tests/run.sh

      # NOTE: the LLM-graded behavioural evals (make evals) are intentionally NOT
      # run here — they cost tokens and need an authenticated `claude` CLI. Run
      # them locally during prompt/judgment-phase iteration.
